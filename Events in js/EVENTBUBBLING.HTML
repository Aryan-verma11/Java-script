<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVENT BUBBLING</title>
    <style>
      .child {
        background: aliceblue;
        border: 2px solid red;
        margin: 14px;
        padding: 14px;
        cursor: pointer;
      }
      .childcontainer {
        background-color: rgb(0, 255, 242);
        padding: 14px;
        margin: 14px;
      }
      .container {
        background-color: rgb(2, 252, 43);
        padding: 14px;
        margin: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="childcontainer">
        <div class="child">i am a child</div>
      </section>
    </div>
    <script>
      document.querySelector(".child").addEventListener("click", (e) => {
        // e.stopPropagation();

        alert("child was clicked");
      });
      document
        .querySelector(".childcontainer")
        .addEventListener("click", (e) => {
          alert("childcontainer was clicked");
        });
      document.querySelector(".container").addEventListener("click", (e) => {
        alert("container was clicked");
      });
      function getRandomColor() {
        let val1 = Math.ceil(0 + Math.random() * 255);
        let val2 = Math.ceil(0 + Math.random() * 255);
        let val3 = Math.ceil(0 + Math.random() * 255);
        return `rgb(${val1}, ${val2}, ${val3})`;
      }
    //   setInterval(() => {
    //     document.querySelector(".childcontainer").style.background =
    //       getRandomColor();
    //   }, 1000);

      //setclear sy apni jagah ruk jata aur oos sy aagye nhi badhta hai

      // ab hum janengy settimeout jo ki baar baar nhi chalta 1 sec ke baad clr chng krega ur fir nhi krega
    setTimeout(() => {
        document.querySelector(".childcontainer").style.background =
          getRandomColor();
      }, 1000);




    </script>
  </body>
</html>
