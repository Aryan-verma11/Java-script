<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>youtube card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        
        <div class="aboutvideo">
             <h3 id="title">Video Title</h3>
            <div class="channel">
            <p id="channel">Channel Name</p>
            <p id="views">1M views</p>
            <P id="time">2 days ago</P>
        </div>
        </div>
        <img class="img1" src="thumbnail.png" alt="Video Thumbnail">
        <span class="durationbox">
            <span id="duration">10:00</span>
        </span>
    </div>
    
    <script src="script.js"></script>
</body>

</html>
